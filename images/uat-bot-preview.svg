<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">UAT Bot Preview</title>
  <desc id="desc">A dashboard-style preview card for UAT Bot extension.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c3f3b"/>
      <stop offset="100%" stop-color="#0a6a5d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg)"/>
  <rect x="16" y="16" width="288" height="148" rx="12" fill="#f6fbf9"/>
  <rect x="30" y="34" width="130" height="16" rx="6" fill="#0f7a64"/>
  <rect x="30" y="58" width="94" height="10" rx="4" fill="#8ba8a2"/>
  <rect x="30" y="86" width="260" height="12" rx="6" fill="#d8e8e4"/>
