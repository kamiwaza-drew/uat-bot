name: kaizen_conversation_probe
description: Probe an existing Kaizen conversation URL after login and send one message.
timeout: 240
required_role: admin
tags:
- kaizen
- conversation
- probe
steps:
- action: screenshot
  screenshot_name: conversation_entry
- action: wait_for
  target: kaizen_chat_input
  timeout: 45
- action: fill
  target: kaizen_chat_input
  value: '{{test_message}}'
- action: screenshot
  screenshot_name: conversation_message_typed
- action: js_eval
  value: "(() => {\n  const button = [...document.querySelectorAll(\"button\")].find((btn)\
    \ => {\n    const text = (btn.textContent || \"\").trim();\n    return text ===\
    \ \"Send\" || text.includes(\"Send\");\n  });\n  if (!button) return \"ERROR:\
    \ send button not found\";\n  if (button.disabled) return \"ERROR: send button\
    \ is disabled\";\n  return \"OK: send button enabled\";\n})()\n"
  timeout: 20
- action: click
  target: kaizen_send_button
  timeout: 10
- action: sleep
  timeout: 25
- action: screenshot
  screenshot_name: conversation_agent_response
  validate:
  - no_errors: true
