  # ─── Phase 6: Conversation 2 — Many short turns + recall ──────────
  # Start a new conversation thread. Kaizen v3 doesn't expose a simple
  # "New conversation" button; the canonical flow is to go back to the
  # agents listing and click Chat on the agent again, which creates a
  # fresh conversation. The current URL is /runtime/apps/<dep>/conversations/<id>,
  # so we navigate to the dep root.
  - action: js_eval
    value: |
      (async () => {
        // Derive the kaizen root from the current /runtime/apps/<dep>/... path
        const m = location.pathname.match(/^(\/runtime\/apps\/[^\/]+)\//);
        const root = m ? m[1] + '/' : (window.__uat_kaizen_url || null);
        if (!root) return 'ERROR: cannot derive kaizen root from path=' + location.pathname;
        location.assign(new URL(root, location.origin).toString());
        return 'OK: navigating to kaizen root ' + root + ' to start a new chat';
      })()
    timeout: 10

