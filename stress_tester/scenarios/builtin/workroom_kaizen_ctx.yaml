    timeout: 8

  # Re-click Chat on the StressTestAgent card (same hover-then-Chat flow as
  # Phase 4's agent-card click) to start conversation #2.
  - action: js_eval
    value: |
      (async () => {
        // Wait for the agent card
        const start = Date.now();
        let cardRoot = null;
        while (Date.now() - start < 15000) {
          const headings = Array.from(document.querySelectorAll('h1, h2, h3, h4'));
          const heading = headings.find(el => (el.textContent || '').includes('StressTestAgent'));
          if (heading) {
            let cur = heading;
            for (let i = 0; i < 6 && cur && cur !== document.body; i++) {
              cur = cur.parentElement;
              if (!cur) break;
              const txt = cur.textContent || '';
              if (txt.includes('Create New Agent') && txt.includes('Build a custom AI')) break;
              cardRoot = cur;
            }
            if (cardRoot) break;
          }
          await new Promise(r => setTimeout(r, 1000));
        }
        if (!cardRoot) return 'ERROR: no StressTestAgent card found for conv2';

        cardRoot.scrollIntoView({block: 'center'});
        await new Promise(r => setTimeout(r, 300));
        const rect = cardRoot.getBoundingClientRect();
        const opts = { bubbles: true, cancelable: true, view: window,
                       clientX: rect.left + rect.width/2,
                       clientY: rect.top + rect.height/2,
                       pointerType: 'mouse', isPrimary: true, pointerId: 1 };
        function fireHover(el) {
          el.dispatchEvent(new MouseEvent('mouseover', opts));
          el.dispatchEvent(new MouseEvent('mouseenter', opts));
          el.dispatchEvent(new PointerEvent('pointerover', opts));
          el.dispatchEvent(new PointerEvent('pointerenter', opts));
        }
        fireHover(cardRoot);
        cardRoot.querySelectorAll('*').forEach(fireHover);

        // Wait for Chat button to mount
        let chatBtn = null;
        const hStart = Date.now();
        while (Date.now() - hStart < 3000) {
          const btns = Array.from(cardRoot.querySelectorAll('button'));
          chatBtn = btns.find(b => {
            const t = (b.textContent || '').trim();
            return t === 'Chat' || t.startsWith('Chat');
          });
          if (chatBtn) break;
          fireHover(cardRoot);
          await new Promise(r => setTimeout(r, 300));
        }
        if (!chatBtn) return 'ERROR: Chat button never rendered for conv2';
        chatBtn.click();
        return 'OK: clicked Chat for conv2';
      })()
    timeout: 25

