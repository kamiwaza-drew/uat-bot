  # ─── Cleanup (always_run) ────────────────────────────────────────
  # Tear down the workroom this bot created via the wm-backend DELETE
  # endpoint. Cascades to extension cleanup inside kamiwaza-core, which
  # invokes app_service.stop_deployment → _release_reserved_port and
  # frees the lb_port reservation in app_deployments. Without this,
  # the platform's 200-port allocation pool (kamiwaza/serving/portallocator.py)
  # leaks one port per bot iteration and eventually all deploy_app POSTs
  # return HTTP 500 → bot sees 502 from wm-backend → retry storm. See
  # uat-bot/load-test-report-0.13.1.md rev 4.13.
  #
  # always_run=true so this fires regardless of whether the bot succeeded
  # through Phase 7 or errored out somewhere in Phase 2-6.
  - action: js_eval
    always_run: true
    value: |
      (async () => {
        // Recover the workroom id even after the bot navigated to the Kaizen frontend
        // (which wiped the original window.__uat_workroom_id global). Phase 1 mirrors
        // the id into localStorage on the same origin, so the value survives.
        let wrId = window.__uat_workroom_id;
        if (!wrId) {
          try { wrId = localStorage.getItem('__uat_workroom_id'); } catch (e) {}
        }
        if (!wrId) return 'SKIP: no workroom_id found in window or localStorage (bot never reached Phase 2)';
        try { localStorage.removeItem('__uat_workroom_id'); } catch (e) {}
        try {
          const res = await fetch('/workrooms/api/workrooms/' + wrId, {
            method: 'DELETE',
            credentials: 'include',
            headers: { 'Accept': 'application/json' },
          });
          if (res.ok || res.status === 404) {
            return 'OK: DELETE workroom ' + wrId + ' → ' + res.status;
          }
          const body = await res.text();
          return 'WARN: DELETE workroom ' + wrId + ' → ' + res.status + ' ' + body.substring(0, 200);
        } catch (e) {
          return 'WARN: DELETE workroom ' + wrId + ' threw: ' + e.message;
        }
      })()
    timeout: 60

  - action: screenshot
    always_run: true
    screenshot_name: 100_cleanup_done
