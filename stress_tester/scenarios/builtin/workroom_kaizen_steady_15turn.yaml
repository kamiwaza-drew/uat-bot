        const log = window.__uat_turn_log || [];
        const ok = log.filter(t => t.response_ok).length;
        const fail = log.length - ok;
        const avgResp = log.filter(t => t.response_ok).reduce((s,t) => s + t.response_ms, 0) / Math.max(1, ok);
        return 'turns_total=' + log.length + ' ok=' + ok + ' fail=' + fail + ' avg_resp_ms=' + Math.round(avgResp);
      })()
