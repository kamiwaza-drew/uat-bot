name: kaizen_duplicate_flow
description: Kaizen test — create an agent through the authenticated browser session, duplicate it, and confirm autosaved edits persist after reload.
timeout: 240
required_role: viewer
tags: [kaizen, agents, duplicate, autosave]

steps:
  - action: navigate
    url: /
    wait_for: domcontentloaded

  - action: screenshot
    screenshot_name: duplicate_home

  - action: js_eval
    value: |
      (async () => {
        const stamp = new Date().toISOString().replace(/[-:TZ.]/g, '').slice(0, 14);
        const agentName = `UAT Duplicate ${stamp}`;
        const deploymentsResponse = await fetch('/api/kamiwaza/active-deployments', {
          credentials: 'include',
        });
        const deploymentsText = await deploymentsResponse.text();
        if (!deploymentsResponse.ok) {
          return `ERROR: failed to load active deployments (${deploymentsResponse.status}): ${deploymentsText}`;
        }

        let deployments;
        try {
          deployments = JSON.parse(deploymentsText);
        } catch (error) {
          return `ERROR: active deployments response was not JSON: ${deploymentsText.slice(0, 300)}`;
        }

        if (!Array.isArray(deployments) || deployments.length === 0) {
          return 'ERROR: no active deployments were returned by /api/kamiwaza/active-deployments';
        }

        const deployment =
          deployments.find((item) => item?.status === 'DEPLOYED' && item?.endpoint_path) ||
          deployments.find((item) => item?.endpoint_path) ||
          deployments[0];
        if (!deployment?.endpoint_path) {
          return `ERROR: active deployment is missing endpoint_path: ${JSON.stringify(deployment)}`;
        }

        const modelName = deployment.m_name ? `openai/${deployment.m_name}` : 'openai/test-model';
        const payload = {
          name: agentName,
          description: 'Seeded by UAT bot for duplicate and autosave coverage.',
          agent_config: {
            llm: {
              provider: 'kamiwaza',
              model: modelName,
              endpoint_path: deployment.endpoint_path,
              native_tool_calling: false,
              temperature: 0.2,
              timeout: 360,
            },
            tools: [
              { name: 'terminal', params: {} },
              { name: 'file_editor', params: {} },
              { name: 'task_tracker', params: {} },
            ],
            mcp_config: {},
            agent_context: {
              custom_instructions: 'Keep responses concise and predictable.',
            },
          },
          custom_instructions: 'Keep responses concise and predictable.',
        };

        const response = await fetch('/api/agents/', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });
        const bodyText = await response.text();
        if (!response.ok) {
          return `ERROR: failed to seed agent (${response.status}): ${bodyText}`;
        }

        const agent = JSON.parse(bodyText);
        localStorage.setItem('uatCreatedAgentId', agent.id);
        localStorage.setItem('uatCreatedAgentName', agent.name || agentName);
        window.location.assign(`/?uat_seed=${stamp}`);
        return `OK: created agent ${agent.id} named ${agent.name || agentName}`;
      })()
    timeout: 20

  - action: wait_for
    wait_for: domcontentloaded
    timeout: 30

  - action: screenshot
    screenshot_name: duplicate_home_seeded

  - action: js_eval
    value: |
      (async () => {
        const targetName = localStorage.getItem('uatCreatedAgentName');
        if (!targetName) return 'ERROR: seeded agent name missing from window state';

        const heading = [...document.querySelectorAll('h3')].find((el) => {
          return (el.textContent || '').trim() === targetName;
        });
        if (!heading) {
          const headings = [...document.querySelectorAll('h3')].map((el) => (el.textContent || '').trim()).join(', ');
          return 'ERROR: seeded agent card not visible. Headings: ' + headings;
        }

        const card = heading.closest('.rounded-2xl') || heading.parentElement;
        if (!card) return 'ERROR: could not derive card container for seeded agent';

        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const opts = { bubbles: true, cancelable: true, clientX: cx, clientY: cy };
        card.dispatchEvent(new PointerEvent('pointerenter', { ...opts, bubbles: false }));
        card.dispatchEvent(new PointerEvent('pointerover', opts));
        card.dispatchEvent(new MouseEvent('mouseenter', { ...opts, bubbles: false }));
        card.dispatchEvent(new MouseEvent('mouseover', opts));

        await new Promise(r => setTimeout(r, 700));

        const duplicateButton = [...card.querySelectorAll('button')].find((btn) => {
          const text = (btn.textContent || '').trim();
          return text === 'Duplicate' || text.includes('Duplicate');
        });
        if (!duplicateButton) {
          const labels = [...card.querySelectorAll('button')].map((btn) => (btn.textContent || '').trim()).join(', ');
          return 'ERROR: Duplicate button not found. Buttons: ' + labels;
        }

        duplicateButton.click();
        return `OK: clicked Duplicate for ${targetName}`;
      })()
    timeout: 20

  - action: screenshot
    screenshot_name: duplicate_edit_page

  - action: js_eval
    value: |
      (async () => {
        const originalName = localStorage.getItem('uatCreatedAgentName');
        if (!originalName) return 'ERROR: original agent name missing from window state';

        const expectedName = `${originalName} Edited`;
        localStorage.setItem('uatEditedAgentName', expectedName);

        const labels = [...document.querySelectorAll('label')];
        const findFieldByLabel = (needle) => {
          const label = labels.find((el) => (el.textContent || '').toLowerCase().includes(needle));
          return label?.parentElement?.querySelector('input, textarea') || null;
        };

        const nameInput = findFieldByLabel('name');
        const descriptionArea = findFieldByLabel('description');
        const customInstructionsArea = labels
          .find((el) => (el.textContent || '').toLowerCase().includes('custom instructions'))
          ?.parentElement?.querySelector('textarea') || null;

        const setNative = (el, value) => {
          const proto = el instanceof HTMLTextAreaElement
            ? HTMLTextAreaElement.prototype
            : HTMLInputElement.prototype;
          const setter = Object.getOwnPropertyDescriptor(proto, 'value').set;
          setter.call(el, value);
          el.dispatchEvent(new Event('input', { bubbles: true }));
          el.dispatchEvent(new Event('change', { bubbles: true }));
        };

        if (nameInput) {
          setNative(nameInput, expectedName);
        }
        if (descriptionArea) {
          setNative(descriptionArea, 'UAT autosave check');
        }
        if (customInstructionsArea) {
          setNative(customInstructionsArea, 'Autosave verified by UAT bot');
        }

        await new Promise(r => setTimeout(r, 2000));
        window.location.reload();
        return `OK: updated duplicate to ${expectedName}`;
      })()
    timeout: 25

  - action: wait_for
    wait_for: domcontentloaded
    timeout: 30

  - action: screenshot
    screenshot_name: duplicate_reloaded

  - action: js_eval
    value: |
      (async () => {
        const heading = document.querySelector('h1');
        const name = (heading?.textContent || '').trim();
        if (name !== localStorage.getItem('uatEditedAgentName')) {
          return 'ERROR: autosaved name did not persist after reload: ' + name;
        }
        return 'OK: autosaved duplicate persisted as ' + name;
      })()
    timeout: 15

  - action: js_eval
    value: |
      (async () => {
        const done = [...document.querySelectorAll('a, button')].find((el) => {
          return (el.textContent || '').trim() === 'Done';
        });
        if (!done) return 'ERROR: Done button not found on agent edit page';
        done.click();
        return 'OK: clicked Done';
      })()
    timeout: 10

  - action: sleep
    timeout: 2

  - action: screenshot
    screenshot_name: agents_after_duplicate

  - action: js_eval
    value: |
      (async () => {
        const pathname = window.location.pathname;
        if (pathname !== '/') {
          return 'ERROR: expected to return to / but landed on ' + pathname;
        }
        const heading = [...document.querySelectorAll('h3')].find((el) => {
          return (el.textContent || '').trim() === localStorage.getItem('uatEditedAgentName');
        });
        if (!heading) {
          return 'ERROR: edited duplicate not visible on the home page';
        }
        return 'OK: returned to home page';
      })()
    timeout: 10
