version: "3.9"
services:
  stress-tester:
    image: kamiwazaai/stress-tester:0.1.0
    ports:
      - "18090"
    environment:
      - KAMIWAZA_URL=${KAMIWAZA_URL:-https://host.docker.internal}
      - KAMIWAZA_ADMIN_USER=${KAMIWAZA_ADMIN_USER:-admin}
      - KAMIWAZA_ADMIN_PASSWORD=${KAMIWAZA_ADMIN_PASSWORD}
      - KAMIWAZA_ADMIN_TOKEN=${KAMIWAZA_ADMIN_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STRESS_TESTER_DATA_DIR=/data
      - STRESS_TESTER_PORT=${STRESS_TESTER_PORT:-18090}
      - STRESS_TESTER_EXTENSION_ROOTS=${STRESS_TESTER_EXTENSION_ROOTS:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - stress-tester-data:/data
    extra_hosts:
      - host.docker.internal:host-gateway
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "3G"

volumes:
  stress-tester-data:
