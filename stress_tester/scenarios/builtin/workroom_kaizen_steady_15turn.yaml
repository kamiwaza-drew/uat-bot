  # Wait for the chat composer to be ready. Kaizen has to:
  #  - Create a conversation record (handleStartChat → createConversationMutation)
  #  - Provision the agent's openhands workspace container (the "STARTING /
  #    Preparing workspace... Setting up StressTestAgent" progress card)
  #  - Navigate router.push('/conversations/{id}')
  #  - Render the composer textarea
  # Workspace provisioning alone takes 2-4 min on this cluster, so give the
  # whole sequence 6 min before declaring failure.
  - action: js_eval
    value: |
      (async () => {
        const start = Date.now();
        const maxMs = 1200000; // 20 min — accommodate cold cluster + slow /api/models
        let lastUrl = location.href;
        let lastSig = '';
        while (Date.now() - start < maxMs) {
          // URL transition is the strongest signal that handleStartChat succeeded
          if (location.href !== lastUrl) {
            console.log('[' + Math.floor((Date.now()-start)/1000) + 's] URL changed: ' + lastUrl + ' -> ' + location.href);
            lastUrl = location.href;
          }
          // Require URL to contain /conversations/ — otherwise we are still
          // on the create-agent wizard and any textarea we'd find is the
          // wizard's Instructions field, NOT the chat composer.
          const onConversationPage = location.href.includes('/conversations/');
          if (onConversationPage) {
            const tas = Array.from(document.querySelectorAll('textarea'));
            const composer = tas.find(t => {
              const r = t.getBoundingClientRect();
              return r.width > 50 && r.height > 0 && !t.disabled && !t.readOnly;
            });
            if (composer) {
              return 'OK: composer ready after ' + Math.floor((Date.now()-start)/1000) + 's, url=' + location.href + ' placeholder=' + (composer.placeholder || '');
            }
          }
          // Log progress periodically based on body text signature
          const sig = (document.body.innerText.match(/STARTING|Preparing workspace|Setting up|Ready|loading|Initializing|Loading models/g) || []).join(',');
          if (sig !== lastSig) {
            console.log('[' + Math.floor((Date.now()-start)/1000) + 's] state: ' + sig + ' url=' + location.href);
            lastSig = sig;
          }
          await new Promise(r => setTimeout(r, 3000));
        }
        const bodyText = (document.body && document.body.innerText.substring(0, 300)) || '?';
        return 'ERROR: composer not found after ' + Math.floor((Date.now()-start)/1000) + 's. url=' + location.href + ' onConvPage=' + location.href.includes('/conversations/') + ' tas=' + document.querySelectorAll('textarea').length + ' lastSig=' + lastSig + ' body=' + bodyText;
      })()
    timeout: 1260

  - action: screenshot
    screenshot_name: 08_kaizen_chat_ready

  - action: js_eval
    value: |
      (async () => {
        window.__uat_runGreetingTurn = async (turnNum, turnText) => {
          // Wait until the next minute boundary so all bots send roughly together.
          const msIntoMin = Date.now() % 60000;
          const waitMs = (60000 - msIntoMin) % 60000;
          if (waitMs > 100) {
            await new Promise(r => setTimeout(r, waitMs));
          }
          const turnStart = Date.now();

          const conversationId = location.href.split('/conversations/')[1]?.split(/[?#/]/)[0];
          if (!conversationId) {
            return 'ERROR turn ' + turnNum + ': conversation id missing from url=' + location.href;
          }

          const fetchConversationEvents = async (offset = 0) => {
            const res = await fetch(
              '/api/conversations/' + conversationId + '/events?offset=' + offset + '&limit=1000&_uat_ts=' + Date.now(),
              {
              credentials: 'include',
              cache: 'no-store',
              headers: {
                'Accept': 'application/json',
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
              }
            });
            if (!res.ok) {
              throw new Error('events_http_' + res.status);
            }
            const body = await res.json();
            if (Array.isArray(body)) return body;
            if (Array.isArray(body?.events)) return body.events;
            if (Array.isArray(body?.items)) return body.items;
            if (Array.isArray(body?.data)) return body.data;
            return [];
          };

          let beforeEventCount = 0;
          try {
            beforeEventCount = (await fetchConversationEvents()).length;
          } catch (e) {
            return 'ERROR turn ' + turnNum + ': failed to read events before send: ' + (e.message || e);
          }

          const tas = Array.from(document.querySelectorAll('textarea')).reverse();
          const composer = tas.find(t => {
            const r = t.getBoundingClientRect();
            return r.width > 0 && r.height > 0 && !t.disabled && !t.readOnly;
          });
          if (!composer) return 'ERROR turn ' + turnNum + ': composer not found';
          const setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
          setter.call(composer, turnText);
          composer.dispatchEvent(new Event('input', { bubbles: true }));

          let sentMs = 0;
          for (let i = 0; i < 600; i++) {
            await new Promise(r => setTimeout(r, 100));
            const sendBtn = document.querySelector('button[aria-label="Send message"]');
            if (sendBtn && !sendBtn.disabled) {
              sendBtn.click();
              sentMs = Date.now() - turnStart;
              break;
            }
          }
          if (!sentMs) return 'ERROR turn ' + turnNum + ': send button never enabled';

          const respDeadline = turnStart + 55000;
          let respMs = 0;
          let lastEventError = '';
          while (Date.now() < respDeadline) {
            try {
              const newEvents = await fetchConversationEvents(beforeEventCount);
              const hasVisibleAssistantReply = newEvents.some((event) => {
                if (event?.kind === 'MessageEvent') {
                  const role = event?.llm_message?.role;
                  return role === 'assistant' || event?.source === 'agent';
                }
                if (event?.kind === 'ActionEvent') {
                  return event?.action?.kind === 'FinishAction' && !!(event?.action?.message || '').trim();
                }
                return false;
              });
              if (hasVisibleAssistantReply) {
                respMs = Date.now() - turnStart;
                break;
              }
            } catch (e) {
              lastEventError = e.message || String(e);
            }
            await new Promise(r => setTimeout(r, 500));
          }

          if (!window.__uat_turn_log) window.__uat_turn_log = [];
          window.__uat_turn_log.push({
            turn: turnNum,
            sent_ms: sentMs,
            response_ms: respMs,
            response_ok: respMs > 0
          });

          return 'turn ' + turnNum + ': sent_ms=' + sentMs + ' response_ms=' + (respMs || 'TIMEOUT') + ' last_event_error=' + lastEventError;
        };
        return 'OK: turn helper installed';
      })()
    timeout: 60



